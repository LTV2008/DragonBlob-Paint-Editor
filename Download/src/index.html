<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- Character encoding and viewport for responsive design -->
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <!-- Page title -->
        <title>DragonBlob Paint Editor</title>
        
        <!-- Favicon: DragonBlob logo -->
        <link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAIoAAABsCAYAAAC1mir7AAAHVklEQVR4Xu2cgW7cOAxEk///6DZJ49TxyuIbipTlXQYBeteVSc7wiZL3gHt/q59lHfjz9vbxq/+8v719/Mb+hAe[...]">
        
        <!-- Global styles -->
        <style>
            /* Reset and body styling */
            body {
                background-color: #3b3b3b;
                color: white;
                font-family: "Trebuchet MS", Arial, sans-serif;
                margin: 0;
                padding: 20px;
            }

            /* Embedded content styling */
            iframe {
                border: none;
                display: block;
            }

            /* Link styling with visited and active states */
            a {
                color: cyan;
                text-decoration: none;
                transition: color 0.2s ease;
            }

            a:visited {
                color: magenta;
            }

            a:active {
                color: yellow;
            }

            a:hover {
                opacity: 0.8;
            }

            /* Center alignment for header and footer elements */
            .header, .footer {
                text-align: center;
            }

            /* Image styling */
            img {
                max-width: 100%;
                height: auto;
            }
        </style>
    </head>
    <body>
        <!-- Main header section with logo -->
        <div class="header">
            <img src="./assets/logosmall.svg" alt="DragonBlob Paint Editor Logo">
        </div>

        <!-- Main paint editor application iframe -->
        <!-- The iframe is embedded from the static build at GitHub Pages -->
        <iframe 
            src="https://ltv2008.github.io/DragonBlob-Paint-Editor/assets/playground.html" 
            width="1000" 
            height="747"
            title="DragonBlob Paint Editor - Interactive Canvas">
        </iframe>

        <!-- Footer section with links -->
        <div class="footer">
            <!-- GitHub fork/source link with icon -->
            <div>
                <a href="https://github.com/LTV2008/DragonBlob-Paint-Editor" title="Fork this project on GitHub">
                    <img src="./assets/fork.svg" alt="Fork this on GitHub"> 
                </a>
            </div>

            <!-- Help and support documentation link -->
            <div>
                <a href="./support/index.html">Help and Support</a>
            </div>
        </div>
    </body>
</html>
